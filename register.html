<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" type="text/css" href="/src/style.css" />
        <link rel="icon" type="image/svg+xml" href="/vite.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="wtech register page" />
        <title>wtech - register</title>
    </head>

    <body>
        <header class="register-header">
            <a class="home-link" href="/">
                <h1>wtech</h1>
            </a>

            <nav class="register-nav" aria-label="Main navigation">
                <a class="black-link" href="/categories">Categories</a>
                <a class="black-link" href="#">Placeholder</a>
                <a class="black-link" href="#">Placeholder</a>
            </nav>

            <div class="header-tools">
                <label class="search-box" for="register-search">
                    <svg
                        class="search-icon"
                        viewBox="0 0 24 24"
                        aria-hidden="true"
                        focusable="false"
                    >
                        <circle cx="11" cy="11" r="7" />
                        <line x1="16.5" y1="16.5" x2="21" y2="21" />
                    </svg>
                    <input
                        id="register-search"
                        type="search"
                        placeholder="Search"
                        aria-label="Search products"
                    />
                </label>

                <button class="icon-button" type="button" aria-label="Open cart">
                    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                        <path d="M3 4h2l2 11h11l2-8H7" />
                        <circle cx="10" cy="19" r="1.5" />
                        <circle cx="17" cy="19" r="1.5" />
                    </svg>
                </button>
            </div>
        </header>

        <main></main>
        <footer></footer>
    </body>
</html>
